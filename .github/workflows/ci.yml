name: StadiumPulse CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint (ruff)
        run: python -m ruff check app/ tests/

      - name: Type check (mypy --strict)
        run: python -m mypy --strict app/

      - name: Test (pytest)
        run: python -m pytest tests/ -v --cov=app --cov-report=term-missing

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Lint (oxlint)
        run: npm run lint

      - name: Type check (tsc)
        run: npx tsc --noEmit

      - name: Test (vitest)
        run: npx vitest run --coverage

      - name: Accessibility (axe-core)
        run: npx vitest run src/__tests__/accessibility.test.tsx

      - name: Build
        run: npm run build
