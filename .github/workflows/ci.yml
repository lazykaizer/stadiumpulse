name: StadiumPulse CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Gitleaks scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint (ruff)
        run: python -m ruff check app/ tests/

      - name: Type check (mypy --strict)
        run: python -m mypy --strict app/

      - name: Test (pytest)
        run: python -m pytest tests/ -v --cov=app --cov-report=term-missing

      - name: Python dependency audit
        run: |
          pip install pip-audit
          pip-audit -r requirements.txt

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Lint (oxlint)
        run: npm run lint

      - name: Type check (tsc)
        run: npx tsc --noEmit

      - name: Test (vitest)
        run: npx vitest run --coverage

      - name: Frontend dependency audit
        run: npm audit --audit-level=high

      - name: Accessibility (axe-core)
        run: npx vitest run src/__tests__/accessibility.test.tsx

      - name: Build
        run: npm run build

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: End-to-End Tests (Playwright)
        run: npm run test:e2e
