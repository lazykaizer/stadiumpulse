[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]

[tool.ruff]
target-version = "py311"
line-length = 120

[tool.ruff.lint]
select = ["E", "F", "W", "I", "N", "UP", "B", "A", "C4", "SIM", "TCH"]
# Ignore E501 because long Gemini prompt strings in prompt_builder.py exceed line limits
# Ignore TCH001/TCH003 because FastAPI and Pydantic need types available at runtime for dependency injection and validation
ignore = ["E501", "TCH001", "TCH003"]

[tool.mypy]
python_version = "3.11"
strict = true
warn_return_any = true
warn_unused_configs = true

[tool.coverage.report]
fail_under = 50
